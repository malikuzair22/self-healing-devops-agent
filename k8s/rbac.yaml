apiVersion: v1
kind: ServiceAccount
metadata:
   name: self-healing-agent-sa
   namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
   name: self-healing-agent-role
   namespace: default
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "deployments/scale"]
    verbs: ["get", "list", "patch", "update"]
  - apiGroups: ["apps"]
    resources: ["replicasets"]
    verbs: ["get", "list", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
   name: self-healing-agent-binding
   namespace: default
subjects:
  - kind: ServiceAccount
    name: self-healing-agent-sa
    namespace: default
roleRef:
   kind: Role
   name: self-healing-agent-role
   apiGroup: rbac.authorization.k8s.io


   